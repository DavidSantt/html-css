<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens</title>
</head>
<body>
    <h1>Imagem</h1>
    <p>Logo abaixo você verá uma imagem flexivel, ou seja está imagem e adaptavel a celulares tablets e TVs/Monitores </p>
    
    <picture>
        <source media="(max-width: 800px)" srcset="img/paisagem-p.png" type="image/png">
        <source media="(max-width: 1250px)" srcset="img/paisagem-m.png" type="image/png">
        <img src="img/paisagem-g.png" alt="Imagem jflexivel">
    </picture>
</body>
</html>
