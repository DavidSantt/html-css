<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centralização vertical</title>
    <style>
        #container {
            background-color: rgb(65, 121, 241);
            background-image: url(imagens/target001.png);
            background-size: 100% 100%;
            height: 96vh;
            padding: 10px;
            position: relative;
        }

        #conteudo {
            background-image: url(imagens/target001.png);
            background-size: 100% 100%;
            background-color: rgb(17, 64, 141);
            position: absolute;
            top: 50%;
            left: 50%;
            height: 200px;
            width: 400px;
            margin: auto;
            transform: translate(-50%, -50%);
        }

    </style>
</head>
<body>
    <section id="container">
        <article id="conteudo">

        </article>
    </section>
</body>
</html>
